name: Publish NuGet Packages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-and-publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Restore dependencies
        run: dotnet restore Vludik.Arbitrage.Shared.sln

      - name: Build (Release)
        run: dotnet build Vludik.Arbitrage.Shared.sln --configuration Release --no-restore

      - name: Pack (only IsPackable=true projects)
        run: dotnet pack Vludik.Arbitrage.Shared.sln --configuration Release --no-build --output ./artifacts

      - name: Set GitHub Packages NuGet source credentials
        run: >
          dotnet nuget update source github
          --username ${{ github.repository_owner }}
          --password ${{ secrets.GH_TOKEN }}
          --store-password-in-clear-text

      - name: Push packages to GitHub Packages
        run: >
          dotnet nuget push "./artifacts/*.nupkg"
          --api-key ${{ secrets.GH_TOKEN }}
          --source github
